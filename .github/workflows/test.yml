name: Go Core CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install gcc
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  cross-compile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Android NDK r29
        uses: android-actions/setup-android@v3
      - run: sdkmanager "ndk;29.0.14206865"

      - name: Cross-compile for android-arm64
        env:
          ANDROID_NDK: ${{ runner.tool_cache }}/android-sdk/ndk/29.0.14206865
        run: make android-arm64
