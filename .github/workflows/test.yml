name: Go Core CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Install gcc
        run: sudo apt-get update && sudo apt-get install -y gcc

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

  cross-compile-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Setup Android NDK
        run: |
          yes | sdkmanager "ndk;29.0.14206865" --sdk_root=$ANDROID_HOME || true
          NDK_PATH=$(find $ANDROID_HOME/ndk -maxdepth 1 -type d -name "29*" | head -1)
          if [ -z "$NDK_PATH" ]; then
            NDK_PATH="$ANDROID_HOME/ndk/29.0.14206865"
          fi
          echo "ANDROID_NDK=$NDK_PATH" >> $GITHUB_ENV
          echo "Found NDK at: $NDK_PATH"
          ls "$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/bin/" | grep "aarch64.*clang$" | head -3

      - name: Cross-compile for android-arm64
        run: make android-arm64
